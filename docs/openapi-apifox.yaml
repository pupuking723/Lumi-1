openapi: 3.0.3
info:
  title: GoClaw Gateway API - Apifox Import Spec
  version: 0.1.0
  description: 'GoClaw 当前项目 HTTP/OpenAPI 接口文档，基于 `internal/http/*` 和 `internal/gateway/server.go` 的路由注册整理，并补充 Apifox 可用请求示例。


    认证：大多数接口使用 `Authorization: Bearer <GOCLAW_GATEWAY_TOKEN 或 API Key>`。常用本地后端地址为 `http://127.0.0.1:9600` 或 Docker 默认 `http://localhost:18790`。


    多租户常用 Header：`X-GoClaw-User-Id`、`X-GoClaw-Tenant-Id`、`Accept-Language`。'
servers:
- url: http://127.0.0.1:9600
  description: 本地开发后端
- url: http://localhost:18790
  description: Docker / 默认后端
tags:
- name: 系统
- name: WebSocket
- name: 对话
- name: 智能体
- name: API 密钥
- name: 模型供应商
- name: OAuth 授权
- name: 技能
- name: 工具
- name: MCP 服务
- name: MCP 桥接
- name: 记忆
- name: 片段记忆
- name: 知识图谱
- name: 知识库
- name: 渠道与联系人
- name: 团队
- name: 调用追踪
- name: 用量统计
- name: 活动日志
- name: 文件存储
- name: 媒体
- name: 待处理消息
- name: 语音
- name: 扩展包
- name: 系统配置
- name: 备份恢复
- name: 租户
- name: 安全 CLI
- name: 自我演化
- name: 编排
- name: V3 开关
- name: 其他
security:
- bearerAuth: []

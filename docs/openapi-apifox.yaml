components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Gateway token or GoClaw API key
  parameters:
    UserIdHeader:
      name: X-GoClaw-User-Id
      in: header
      required: false
      description: 外部用户 ID，用于 session/memory/user scope。
      schema:
        type: string
      example: user-a
    TenantHeader:
      name: X-GoClaw-Tenant-Id
      in: header
      required: false
      description: 租户 UUID 或 slug；使用 gateway token / system key 跨租户时常用。
      schema:
        type: string
      example: default
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      description: 错误信息语言。
      schema:
        type: string
        enum:
        - en
        - vi
        - zh
      example: zh
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid request
    Unauthorized:
      description: 未认证或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: unauthorized
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: permission denied
    InternalError:
      description: 服务端错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: internal error
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        error:
          description: 错误字符串或错误对象
          oneOf:
          - type: string
          - type: object
            additionalProperties: true
    GenericObject:
      type: object
      additionalProperties: true
